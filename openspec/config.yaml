schema: spec-driven

context: |
  Проект: HAIntly — AI-инструмент для поиска вакансий HeadHunter, их оценки относительно выбранного резюме и подготовки сопроводительных писем.
  Архитектура: микросервисная. Сервисы владеют собственными данными и не обращаются напрямую к чужим БД.
  Сервисы: main-fe, main-be, profile-service, vacancy-service, ai-service, notification-service.
  main-fe взаимодействует только с main-be по HTTP и SSE.
  main-be отвечает за пользователей, auth, API gateway, оркестрацию и доставку уведомлений в UI.
  profile-service отвечает за HH OAuth, связи аккаунтов, защищённое хранение токенов и резюме.
  vacancy-service отвечает за сбор вакансий, пользовательские статусы и запуск AI-обработки.
  ai-service отвечает за оценку релевантности 1–100, сопроводительные письма, AI-настройки и статистику токенов.
  notification-service отвечает за историю, настройки и доставку уведомлений.
  Синхронные интеграции используют HTTP, пользовательские уведомления — SSE, асинхронные межсервисные события и задания — NATS JetStream.
  OpenSpec change является единственным источником планирования изменения.
  Входные ТЗ могут храниться в docs/prompts/<slug>.md.
  Смысловой текст артефактов пишется по-русски. Обязательные структурные маркеры OpenSpec сохраняются на английском языке.

rules:
  proposal:
    - Пиши смысловое содержание на русском языке.
    - Описывай проблему, пользовательскую ценность, границы изменения и явно исключённый scope.
    - Перечисляй затронутые сервисы и объясняй причину воздействия на каждый из них.
    - Не переноси ответственность, данные или контракт между сервисами без явного указания.
  design:
    - Пиши смысловое содержание на русском языке.
    - Для каждого потока указывай владельца данных, инициатора, получателя и протокол HTTP, SSE или NATS JetStream.
    - Отдельно фиксируй изменения API, событий, БД, фоновой обработки, безопасности и персональных данных.
    - Для HH, AI/LLM и брокера используй адаптеры и интерфейсы на инфраструктурной границе.
    - Не придумывай endpoint, subject, порт или схему сообщения без необходимости для изменения.
  tasks:
    - Пиши задачи на русском языке в формате checkbox, который требует OpenSpec.
    - Используй нумерованные секции Backend, Frontend и Quality Gate.
    - В Backend и Frontend группируй задачи по техническим именам затронутых сервисов.
    - Делай задачи атомарными, проверяемыми и упорядоченными по зависимостям.
    - Для любого изменения кода добавляй тесты и отдельные задачи Quality Gate.
  specs:
    - Пиши названия и содержание требований и сценариев на русском языке.
    - Сохраняй обязательные маркеры ADDED Requirements, MODIFIED Requirements, REMOVED Requirements, RENAMED Requirements, Requirement, Scenario, WHEN и THEN на английском языке.
    - Формулируй нормативные требования однозначно и проверяемо.
    - Каждое требование должно иметь хотя бы один пользовательский или системный сценарий.

name: haintly-vacancy-service

services:
  app:
    build:
      context: ../services/vacancy-service
      dockerfile: Dockerfile
    container_name: haintly-vacancy-service
    restart: always
    env_file:
      - path: ../services/vacancy-service/.env
        required: true
    ports:
      - "8103:8000"
    volumes:
      - ../services/vacancy-service/src:/app/src:${DEV_MOUNT:-ro}
    working_dir: /app/
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - haintly_network

  migration:
    build:
      context: ../services/vacancy-service
      dockerfile: Dockerfile
    container_name: haintly-vacancy-service-migration
    restart: "no"
    env_file:
      - path: ../services/vacancy-service/.env
        required: true
    volumes:
      - ../services/vacancy-service/src:/app/src:${DEV_MOUNT:-ro}
    working_dir: /app/src
    command: >
      sh -c 'if [ "$$SKIP_MIGRATIONS" = "true" ]; then
        echo "Миграции пропущены (SKIP_MIGRATIONS=true)";
        exit 0;
      else
        uv run --no-sync alembic -c alembic.ini upgrade head;
      fi'
    networks:
      - haintly_network

  worker:
    build: 
      context: ../services/vacancy-service
      dockerfile: Dockerfile
    container_name: haintly-vacancy-service-worker
    restart: always
    env_file: ../services/vacancy-service/.env
    command: uv run --no-sync celery -A tasks.celery_app worker --loglevel=INFO
    volumes:
      - ../services/vacancy-service/src:/app/src:${DEV_MOUNT:-ro}
    working_dir: /app/src
    networks: [haintly_network]
    depends_on:
      migration: 
        condition: service_completed_successfully

  beat:
    build: 
      context: ../services/vacancy-service
      dockerfile: Dockerfile
    container_name: haintly-vacancy-service-beat
    restart: always
    env_file: ../services/vacancy-service/.env
    command: uv run --no-sync celery -A tasks.celery_app beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule
    volumes:
      - ../services/vacancy-service/src:/app/src:${DEV_MOUNT:-ro}
    working_dir: /app/src
    networks: [haintly_network]
    depends_on:
      migration: 
        condition: service_completed_successfully

networks:
  haintly_network:
    external: true
